<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Visit Sample City — Test Page (Mobile View)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100vh;background:#1a1f2a;font-family:'Inter',system-ui,sans-serif;color:#aebbcc;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px}
    .label{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#7a8696;margin-bottom:6px}
    h1{font-size:22px;margin:0 0 4px;color:#fff;font-weight:700;letter-spacing:-.01em}
    .sub{font-size:13px;color:#7a8696;margin-bottom:24px}
    .frame{width:393px;height:852px;border-radius:36px;overflow:hidden;background:#000;box-shadow:0 24px 64px rgba(0,0,0,.5);border:1px solid #2d3a4d;position:relative}
    .frame iframe{width:100%;height:100%;border:0;display:block}
    .controls{margin-top:24px;display:flex;gap:10px}
    .controls a{padding:10px 18px;border-radius:99px;font-size:13px;font-weight:600;text-decoration:none;background:#fff;color:#0f1f2c;transition:transform .12s}
    .controls a.alt{background:transparent;color:#aebbcc;border:1px solid #3a4a5f}
    .controls a:hover{transform:translateY(-1px)}
    .hint{margin-top:18px;font-size:12px;color:#5a6877;max-width:393px;text-align:center;line-height:1.5}
  </style>
</head>
<body>

  <div class="label">SPLSHY Demo Page</div>
  <h1>Mobile preview</h1>
  <div class="sub">393 × 852 (iPhone 16 logical viewport)</div>

  <div class="frame">
    <iframe src="../" title="Mobile-framed demo page"></iframe>
  </div>

  <div class="controls">
    <a href="../">⤺ Back to desktop view</a>
  </div>

  <p class="hint">This wraps <code>/test/</code> in a fixed-width iframe so its mobile media queries fire. Same page, same content — just constrained to a phone-sized viewport.</p>

</body>
</html>

<!doctype html>

<!-- Pixel-drop favicon, inline SVG, no extra request. -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='7' y='2' width='2' height='2' fill='%231191ad'/%3E%3Crect x='6' y='4' width='4' height='2' fill='%231191ad'/%3E%3Crect x='5' y='6' width='6' height='2' fill='%231191ad'/%3E%3Crect x='4' y='8' width='8' height='5' fill='%231191ad'/%3E%3Crect x='5' y='13' width='6' height='1' fill='%231191ad'/%3E%3Crect x='6' y='10' width='2' height='2' fill='%23e85d2e'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">

<style>
  :root {
    --navy:     #082440;
    --deepwave: #0a4d5c;
    --teal:     #1191ad;
    --crest:    #5fb8cc;
    --orange:   #e85d2e;
    --ink:      #f8fafc;
    --muted:    #88a3bf;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--navy);
    color: var(--ink);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    min-height: 100vh;
    min-height: 100dvh;
  }
  body {
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }
  /* Wave canvas sits behind everything. position:fixed so it stays
     locked to the viewport even if the page scrolls past on tiny
     screens. aria-hidden — decorative. */
  canvas#waves {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 56px 20px 200px;
    text-align: center;
  }
  /* Wordmark — Press Start 2P scaled large with a two-layer pixel
     drop shadow. Brand orange foreground, teal echo, deep-wave depth. */
  h1.wordmark {
    font-size: clamp(34px, 11vw, 96px);
    margin: 0 0 30px;
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--orange);
    text-shadow:
      3px 3px 0 var(--teal),
      6px 6px 0 var(--deepwave);
  }
  p.tagline {
    font-size: clamp(10px, 1.7vw, 15px);
    margin: 0;
    color: var(--crest);
    letter-spacing: 0.06em;
    line-height: 1.7;
  }
  p.tagline .splash {
    color: var(--orange);
  }
  /* Footer overlays the bottom of the waves with a translucent
     navy backdrop so the copy stays readable against the animation. */
  footer {
    position: relative;
    z-index: 1;
    padding: 24px 20px 28px;
    text-align: center;
    background: linear-gradient(180deg, rgba(8,36,64,0) 0%, rgba(8,36,64,0.85) 30%, rgba(8,36,64,0.92) 100%);
  }
  footer p {
    font-size: clamp(8px, 1vw, 10px);
    line-height: 1.9;
    margin: 0 0 10px;
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  footer p.attr {
    margin: 6px 0 0;
    color: var(--muted);
  }
  footer a {
    color: var(--crest);
    text-decoration: none;
    border-bottom: 1px solid rgba(95, 184, 204, 0.4);
    padding-bottom: 1px;
    transition: color .15s, border-color .15s;
  }
  footer a:hover,
  footer a:focus-visible {
    color: var(--orange);
    border-bottom-color: var(--orange);
    outline: none;
  }
  /* Press Start 2P stays legible down to ~9-10px but breaks below
     that. On very narrow phones, fall back to a system mono for the
     footer body copy so visitors can actually read it. */
  @media (max-width: 380px) {
    footer p {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.6;
      letter-spacing: 0;
    }
  }
</style>
</head>
<body>

<canvas id="waves" aria-hidden="true"></canvas>

<main>
  <h1 class="wordmark">SPLSHY</h1>
  <p class="tagline">Make a splash with <span class="splash">SPLSHY</span> widgets</p>
</main>

<footer>
  <p class="attr">© 2026 Michael Robson</p>
</footer>

<script>
(function () {
  var canvas = document.getElementById('waves');
  var ctx    = canvas.getContext('2d');
  // Each "pixel" is this many real pixels on a 1x display — keeps
  // the chunky retro look on modern high-DPI screens.
  var PIXEL_SIZE = 4;
  var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Wave layers, drawn back-to-front. yFrac is the resting Y as a
  // fraction of canvas height; amplitude/frequency/speed control the
  // motion. Front waves get slightly higher amplitude and faster
  // speed so the parallax reads naturally.
  var waves = [
    { yFrac: 0.60, amplitude: 16, frequency: 0.013, speed: 0.020, color: '#0a4d5c' },
    { yFrac: 0.70, amplitude: 22, frequency: 0.017, speed: 0.026, color: '#1191ad' },
    { yFrac: 0.81, amplitude: 18, frequency: 0.022, speed: 0.032, color: '#5fb8cc' }
  ];

  // Orange splash particles erupt from random wave crests every ~1.5s,
  // arc up, and fall back into the water under gravity. Pixel-snapped
  // for the retro feel.
  var splashes = [];

  // Pixel-art dolphin facing right, 12 cols x 5 rows. Each char is
  // one chunky pixel: ' '=transparent, 'B'=body teal, 'b'=belly
  // highlight, 'd'=dark accent (tail tip, eye, snout point).
  var DOLPHIN = [
    "    BB      ",
    "  ddBBBBB   ",
    " ddBBBBBBBd ",
    "   BBBdBBBB ",
    "    bbbbB   "
  ];
  var DOLPHIN_W = DOLPHIN[0].length;
  var DOLPHIN_H = DOLPHIN.length;
  var dolphins = [];

  var t = 0;
  var rafId = null;

  function resize() {
    var dpr = window.devicePixelRatio || 1;
    var w = window.innerWidth;
    var h = window.innerHeight;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width  = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = false;
  }

  function snap(v) { return Math.floor(v / PIXEL_SIZE) * PIXEL_SIZE; }

  function drawFrame() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    // Navy sky fill.
    ctx.fillStyle = '#082440';
    ctx.fillRect(0, 0, w, h);

    // Waves, back to front. Each column fills downward from its
    // sine-derived top edge.
    for (var i = 0; i < waves.length; i++) {
      var wave = waves[i];
      var yBase = h * wave.yFrac;
      var isFront = (i === waves.length - 1);
      for (var x = 0; x < w; x += PIXEL_SIZE) {
        var sinVal = Math.sin(x * wave.frequency + t * wave.speed);
        var raw = yBase + sinVal * wave.amplitude;
        var yTop = snap(raw);
        ctx.fillStyle = wave.color;
        for (var y = yTop; y < h; y += PIXEL_SIZE) {
          ctx.fillRect(x, y, PIXEL_SIZE, PIXEL_SIZE);
        }
        // Whitecaps: on the front wave only, the top 1-2 pixel rows
        // at a crest peak are rendered in near-white instead of the
        // crest blue. sinVal < -0.55 means we're near the top of the
        // wave (sine minimum = highest crest). The "deeper" the crest
        // (more negative sinVal), the more rows go white.
        if (isFront && sinVal < -0.55) {
          ctx.fillStyle = '#f8fafc';
          ctx.fillRect(x, yTop, PIXEL_SIZE, PIXEL_SIZE);
          if (sinVal < -0.85) {
            ctx.fillRect(x, yTop + PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
          }
        }
      }
    }

    // Dolphins jumping (drawn behind front splash particles but on top
    // of waves so the body reads against the navy sky above the water).
    for (var di = dolphins.length - 1; di >= 0; di--) {
      var dlph = dolphins[di];
      dlph.x += dlph.vx;
      dlph.y += dlph.vy;
      dlph.vy += 0.16;   // gravity
      dlph.age++;
      // Despawn once dolphin has fallen well below the front-wave line.
      var fw = waves[waves.length - 1];
      var waterY = h * fw.yFrac;
      if (dlph.vy > 0 && dlph.y > waterY + 24) {
        dolphins.splice(di, 1);
        continue;
      }
      drawDolphin(dlph);
    }

    // Splash particles (drawn in front).
    ctx.fillStyle = '#e85d2e';
    for (var s = splashes.length - 1; s >= 0; s--) {
      var sp = splashes[s];
      sp.x += sp.vx;
      sp.y += sp.vy;
      sp.vy += 0.13;
      sp.age++;
      if (sp.age > sp.lifespan) {
        splashes.splice(s, 1);
        continue;
      }
      ctx.fillRect(snap(sp.x), snap(sp.y), PIXEL_SIZE, PIXEL_SIZE);
    }
  }

  // Draw a dolphin sprite at its current world position. Sprite is
  // mirrored horizontally when facing left and flipped vertically when
  // descending so the body orientation roughly matches the arc.
  function drawDolphin(d) {
    var flipY = d.vy > 0;            // descending half of the arc
    var mirrorX = !d.facingRight;
    for (var r = 0; r < DOLPHIN_H; r++) {
      var row = DOLPHIN[flipY ? (DOLPHIN_H - 1 - r) : r];
      for (var c = 0; c < DOLPHIN_W; c++) {
        var ch = row[mirrorX ? (DOLPHIN_W - 1 - c) : c];
        if (ch === ' ') continue;
        var color = ch === 'B' ? '#5fb8cc'
                  : ch === 'b' ? '#a0d8e2'
                  :              '#0a4d5c';   // 'd'
        ctx.fillStyle = color;
        var px = snap(d.x + (c - DOLPHIN_W / 2) * PIXEL_SIZE);
        var py = snap(d.y + (r - DOLPHIN_H / 2) * PIXEL_SIZE);
        ctx.fillRect(px, py, PIXEL_SIZE, PIXEL_SIZE);
      }
    }
  }

  // Spawn a dolphin off-screen on one side, arcing across some chunk
  // of the viewport. The launch velocity puts the apex roughly 80-120
  // pixels above the front wave line; gravity matches the per-frame
  // 0.16 in the update loop above.
  function spawnDolphin() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    var fw = waves[waves.length - 1];
    var startY = h * fw.yFrac + fw.amplitude * 0.6;
    var ltr = Math.random() < 0.5;
    var horiz = 2.6 + Math.random() * 1.4;
    var vert  = -4.6 - Math.random() * 1.4;
    dolphins.push({
      x: ltr ? -DOLPHIN_W * PIXEL_SIZE : w + DOLPHIN_W * PIXEL_SIZE,
      y: startY,
      vx: ltr ? horiz : -horiz,
      vy: vert,
      facingRight: ltr,
      age: 0
    });
  }

  function spawnSplash() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    var wave = waves[waves.length - 1];   // front-most wave
    var x = Math.random() * w;
    var yTop = h * wave.yFrac + Math.sin(x * wave.frequency + t * wave.speed) * wave.amplitude;
    var count = 3 + Math.floor(Math.random() * 3);
    for (var i = 0; i < count; i++) {
      splashes.push({
        x: x + (Math.random() - 0.5) * 14,
        y: yTop,
        vx: (Math.random() - 0.5) * 0.7,
        vy: -1.3 - Math.random() * 1.4,
        age: 0,
        lifespan: 22 + Math.floor(Math.random() * 18)
      });
    }
  }

  function animate() {
    drawFrame();
    // Splashes: ~every 1.5s at 60fps.
    if (t % 90 === 0) spawnSplash();
    // Dolphins: ~every 5s at 60fps. Start the first one ~2s in so the
    // page doesn't open with a dolphin already mid-flight.
    if (t > 120 && (t - 120) % 300 === 0) spawnDolphin();
    t += 1;
    rafId = requestAnimationFrame(animate);
  }

  // Initial sizing + paint.
  resize();
  window.addEventListener('resize', function () {
    resize();
    if (reduced) drawFrame();
  });

  if (reduced) {
    drawFrame();
  } else {
    animate();
  }
})();
</script>

</body>
</html>

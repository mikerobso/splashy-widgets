<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SPLSHY — Make a splash</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="SPLSHY hosts the vertical video widgets currently running on visitraleigh.com.">
<meta name="theme-color" content="#082440">

<meta property="og:type" content="website">
<meta property="og:title" content="SPLSHY — Make a splash">
<meta property="og:description" content="SPLSHY hosts the vertical video widgets currently running on visitraleigh.com.">
<meta property="og:url" content="https://splshy.com">
<meta property="og:site_name" content="SPLSHY">
<meta name="twitter:card" content="summary">

<!-- Pixel-drop favicon, inline SVG, no extra request. -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect x='7' y='2' width='2' height='2' fill='%231191ad'/%3E%3Crect x='6' y='4' width='4' height='2' fill='%231191ad'/%3E%3Crect x='5' y='6' width='6' height='2' fill='%231191ad'/%3E%3Crect x='4' y='8' width='8' height='5' fill='%231191ad'/%3E%3Crect x='5' y='13' width='6' height='1' fill='%231191ad'/%3E%3Crect x='6' y='10' width='2' height='2' fill='%23e85d2e'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">

<style>
  :root {
    --navy:     #082440;
    --deepwave: #0a4d5c;
    --teal:     #1191ad;
    --crest:    #5fb8cc;
    --orange:   #e85d2e;
    --ink:      #f8fafc;
    --muted:    #88a3bf;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--navy);
    color: var(--ink);
    font-family: 'Press Start 2P', ui-monospace, monospace;
    min-height: 100vh;
    min-height: 100dvh;
  }
  body {
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }
  /* Wave canvas sits behind everything. position:fixed so it stays
     locked to the viewport even if the page scrolls past on tiny
     screens. aria-hidden — decorative. */
  canvas#waves {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 56px 20px 200px;
    text-align: center;
  }
  /* Wordmark — Press Start 2P scaled large with a two-layer pixel
     drop shadow. Brand orange foreground, teal echo, deep-wave depth. */
  h1.wordmark {
    font-size: clamp(34px, 11vw, 96px);
    margin: 0 0 30px;
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--orange);
    text-shadow:
      3px 3px 0 var(--teal),
      6px 6px 0 var(--deepwave);
  }
  p.tagline {
    font-size: clamp(10px, 1.7vw, 15px);
    margin: 0;
    color: var(--crest);
    letter-spacing: 0.06em;
    line-height: 1.7;
  }
  p.tagline .splash {
    color: var(--orange);
  }
  /* Footer overlays the bottom of the waves with a translucent
     navy backdrop so the copy stays readable against the animation. */
  footer {
    position: relative;
    z-index: 1;
    padding: 24px 20px 28px;
    text-align: center;
    background: linear-gradient(180deg, rgba(8,36,64,0) 0%, rgba(8,36,64,0.85) 30%, rgba(8,36,64,0.92) 100%);
  }
  footer p {
    font-size: clamp(8px, 1vw, 10px);
    line-height: 1.9;
    margin: 0 0 10px;
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  footer p.attr {
    margin: 6px 0 0;
    color: var(--muted);
  }
  footer a {
    color: var(--crest);
    text-decoration: none;
    border-bottom: 1px solid rgba(95, 184, 204, 0.4);
    padding-bottom: 1px;
    transition: color .15s, border-color .15s;
  }
  footer a:hover,
  footer a:focus-visible {
    color: var(--orange);
    border-bottom-color: var(--orange);
    outline: none;
  }
  /* Press Start 2P stays legible down to ~9-10px but breaks below
     that. On very narrow phones, fall back to a system mono for the
     footer body copy so visitors can actually read it. */
  @media (max-width: 380px) {
    footer p {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      line-height: 1.6;
      letter-spacing: 0;
    }
  }
</style>
</head>
<body>

<canvas id="waves" aria-hidden="true"></canvas>

<main>
  <h1 class="wordmark">SPLSHY</h1>
  <p class="tagline">Make a splash with <span class="splash">SPLSHY</span> widgets</p>
</main>

<footer>
  <p class="attr">© 2026 Michael Robson</p>
</footer>

<script>
(function () {
  var canvas = document.getElementById('waves');
  var ctx    = canvas.getContext('2d');
  // Each "pixel" is this many real pixels on a 1x display — keeps
  // the chunky retro look on modern high-DPI screens.
  var PIXEL_SIZE = 4;
  var reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function snap(v) { return Math.floor(v / PIXEL_SIZE) * PIXEL_SIZE; }

  // Wave layers, drawn back-to-front. yFrac is the resting Y as a
  // fraction of canvas height; amplitude/frequency/speed control the
  // motion. Front waves get slightly higher amplitude and faster
  // speed so the parallax reads naturally.
  var waves = [
    { yFrac: 0.60, amplitude: 16, frequency: 0.013, speed: 0.020, color: '#0a4d5c' },
    { yFrac: 0.70, amplitude: 22, frequency: 0.017, speed: 0.026, color: '#1191ad' },
    { yFrac: 0.81, amplitude: 18, frequency: 0.022, speed: 0.032, color: '#5fb8cc' }
  ];

  // Stars: positions seeded at page load (and on resize), each twinkles
  // through a three-state cycle (bright / dim / off) on its own period.
  var stars = [];
  function generateStars() {
    stars = [];
    var w = window.innerWidth;
    var h = window.innerHeight;
    var maxY = h * 0.50;          // sky-only zone, above the waves
    var count = Math.max(6, Math.floor(w / 128));
    for (var i = 0; i < count; i++) {
      stars.push({
        x: snap(Math.random() * w),
        y: snap(Math.random() * maxY),
        phase: Math.random() * Math.PI * 2,
        period: 60 + Math.random() * 240   // ~1-5 second twinkle
      });
    }
  }

  // Moon: 9x9 crescent (about 30% bigger than the original disc),
  // lit on the left, cusps pointing right. Traverses the sky on a
  // sine arc every ~90 seconds — rises from the horizon at the left
  // edge, peaks mid-screen, sets off the right, then restarts.
  var MOON = [
    "    Y    ",
    "  YY     ",
    " YY      ",
    " YY      ",
    "YYY      ",
    " YY      ",
    " YY      ",
    "  YY     ",
    "    Y    "
  ];
  var MOON_COLORS = { Y: '#f0e6c8' };
  var MOON_CYCLE = 60 * 90;   // frames per full traverse

  // Sailboats: both share the same triangle catboat form. The boat
  // assigned to the front wave (lowest layer) gets the brand-orange
  // sail; the middle-wave boat gets a cream sail. Sail color is tied
  // to wave layer so the pairing stays consistent on every spawn.
  // Sprite is always mirrored when rendered (boats go right-to-left)
  // so the sail visually points left, toward the direction of travel.
  var SAILBOAT = [
    "  d     ",
    "  dB    ",
    "  dBB   ",
    "  dBBB  ",
    "  dBBBB ",
    "ddddddd ",
    " hhhhh  "
  ];
  var SAILBOAT_CREAM  = { d: '#0a4d5c', B: '#f0e6c8', h: '#1a2438' };
  var SAILBOAT_ORANGE = { d: '#0a4d5c', B: '#e85d2e', h: '#1a2438' };
  var sailboats = [];

  // Dolphins: 12x5 chunky pixel sprite, leaps in an arc out of the
  // front wave roughly every 5 seconds.
  var DOLPHIN = [
    "    BB      ",
    "  ddBBBBB   ",
    " ddBBBBBBBd ",
    "   BBBdBBBB ",
    "    bbbbB   "
  ];
  var DOLPHIN_COLORS = { B: '#5fb8cc', b: '#a0d8e2', d: '#0a4d5c' };
  var DOLPHIN_W = DOLPHIN[0].length;
  var dolphins = [];

  // Orange splash particles erupt from random wave crests every ~1.5s.
  var splashes = [];

  var t = 0;

  function resize() {
    var dpr = window.devicePixelRatio || 1;
    var w = window.innerWidth;
    var h = window.innerHeight;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width  = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = false;
    generateStars();
  }

  // Generic chunky-pixel sprite renderer: cx/cy is the SPRITE CENTER,
  // mirror flips X, flipY flips Y. Unknown chars / spaces are skipped.
  function drawSprite(sprite, colors, cx, cy, mirror, flipY) {
    var rows = sprite.length;
    var cols = sprite[0].length;
    for (var r = 0; r < rows; r++) {
      var row = sprite[flipY ? (rows - 1 - r) : r];
      for (var c = 0; c < cols; c++) {
        var ch = row[mirror ? (cols - 1 - c) : c];
        if (ch === ' ') continue;
        var color = colors[ch];
        if (!color) continue;
        ctx.fillStyle = color;
        ctx.fillRect(
          snap(cx + (c - cols / 2) * PIXEL_SIZE),
          snap(cy + (r - rows / 2) * PIXEL_SIZE),
          PIXEL_SIZE, PIXEL_SIZE
        );
      }
    }
  }

  function drawStars() {
    for (var i = 0; i < stars.length; i++) {
      var star = stars[i];
      var lit = Math.sin(t * 2 * Math.PI / star.period + star.phase);
      if (lit > 0.55) {
        ctx.fillStyle = '#f8fafc';
        ctx.fillRect(star.x, star.y, PIXEL_SIZE, PIXEL_SIZE);
      } else if (lit > 0) {
        ctx.fillStyle = '#88a3bf';
        ctx.fillRect(star.x, star.y, PIXEL_SIZE, PIXEL_SIZE);
      }
      // else: off this frame
    }
  }

  function drawMoon() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    var progress = (t % MOON_CYCLE) / MOON_CYCLE;
    // Sine arc: peaks at progress=0.5, near horizon at edges. Horizon
    // sits just above the back wave's resting line.
    var horizonY  = h * (waves[0].yFrac - 0.04);
    var peakAbove = h * 0.34;
    var x = -40 + progress * (w + 80);
    var y = horizonY - peakAbove * Math.sin(progress * Math.PI);
    drawSprite(MOON, MOON_COLORS, x, y, true, false);  // mirrored: lit on right, cusps point left
  }

  // Sailboats always sail right-to-left, each on a distinct wave
  // layer (middle or front — never the back wave, which would be
  // obscured by everything in front). The two-on-screen-at-once cap
  // plus the "pick an unoccupied layer" rule means the two visible
  // boats are always on different layers, bobbing to different sine
  // rhythms.
  function spawnSailboat() {
    var w = window.innerWidth;
    var occupied = sailboats.map(function (s) { return s.waveIdx; });
    var pool = [1, 2].filter(function (i) { return occupied.indexOf(i) === -1; });
    if (!pool.length) return;
    var waveIdx = pool[Math.floor(Math.random() * pool.length)];
    sailboats.push({
      x: w + 36,
      vx: -(0.32 + Math.random() * 0.20),
      waveIdx: waveIdx
    });
  }

  // Step sailboat positions (called once per frame, separately from
  // rendering, since rendering happens layer-by-layer inside drawFrame).
  function stepSailboats() {
    if (reduced) return;
    var w = window.innerWidth;
    for (var i = sailboats.length - 1; i >= 0; i--) {
      var sb = sailboats[i];
      sb.x += sb.vx;
      if (sb.x < -60 || sb.x > w + 60) sailboats.splice(i, 1);
    }
  }

  // Render only the sailboats riding wave `waveIdx`. Called right
  // after that wave's pixels are drawn so the next wave layer in
  // front naturally occludes anything sticking down into it.
  function drawSailboatsOnLayer(waveIdx) {
    var h = window.innerHeight;
    var wave = waves[waveIdx];
    // Front-wave boat = orange sail; middle-wave boat = cream sail.
    var colors = waveIdx === 2 ? SAILBOAT_ORANGE : SAILBOAT_CREAM;
    for (var i = 0; i < sailboats.length; i++) {
      var sb = sailboats[i];
      if (sb.waveIdx !== waveIdx) continue;
      var sinVal = Math.sin(sb.x * wave.frequency + t * wave.speed);
      var waterY = h * wave.yFrac + sinVal * wave.amplitude;
      // Hull bottom rests at the wave surface.
      var cy = waterY - (SAILBOAT.length / 2 - 1.5) * PIXEL_SIZE;
      drawSprite(SAILBOAT, colors, sb.x, cy, true, false);   // always mirrored (right-to-left)
    }
  }

  function spawnDolphin() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    var fw = waves[waves.length - 1];
    var startY = h * fw.yFrac + fw.amplitude * 0.6;
    var ltr = Math.random() < 0.5;
    var horiz = 2.6 + Math.random() * 1.4;
    var vert  = -4.6 - Math.random() * 1.4;
    dolphins.push({
      x: ltr ? -DOLPHIN_W * PIXEL_SIZE : w + DOLPHIN_W * PIXEL_SIZE,
      y: startY,
      vx: ltr ? horiz : -horiz,
      vy: vert,
      facingRight: ltr,
      age: 0
    });
  }

  function drawDolphins() {
    var h = window.innerHeight;
    var fw = waves[waves.length - 1];
    for (var i = dolphins.length - 1; i >= 0; i--) {
      var d = dolphins[i];
      d.x += d.vx;
      d.y += d.vy;
      d.vy += 0.16;
      d.age++;
      var waterY = h * fw.yFrac;
      if (d.vy > 0 && d.y > waterY + 24) {
        dolphins.splice(i, 1);
        continue;
      }
      drawSprite(DOLPHIN, DOLPHIN_COLORS, d.x, d.y, !d.facingRight, d.vy > 0);
    }
  }

  function spawnSplash() {
    var w = window.innerWidth;
    var h = window.innerHeight;
    var fw = waves[waves.length - 1];
    var x = Math.random() * w;
    var yTop = h * fw.yFrac + Math.sin(x * fw.frequency + t * fw.speed) * fw.amplitude;
    var count = 3 + Math.floor(Math.random() * 3);
    for (var i = 0; i < count; i++) {
      splashes.push({
        x: x + (Math.random() - 0.5) * 14,
        y: yTop,
        vx: (Math.random() - 0.5) * 0.7,
        vy: -1.3 - Math.random() * 1.4,
        age: 0,
        lifespan: 22 + Math.floor(Math.random() * 18)
      });
    }
  }

  function drawSplashes() {
    ctx.fillStyle = '#e85d2e';
    for (var s = splashes.length - 1; s >= 0; s--) {
      var sp = splashes[s];
      sp.x += sp.vx;
      sp.y += sp.vy;
      sp.vy += 0.13;
      sp.age++;
      if (sp.age > sp.lifespan) {
        splashes.splice(s, 1);
        continue;
      }
      ctx.fillRect(snap(sp.x), snap(sp.y), PIXEL_SIZE, PIXEL_SIZE);
    }
  }

  function drawFrame() {
    var w = window.innerWidth;
    var h = window.innerHeight;

    // 1. Sky fill.
    ctx.fillStyle = '#082440';
    ctx.fillRect(0, 0, w, h);

    // 2. Stars + 3. Moon. Both are sky elements; draw before waves so
    // the waves naturally occlude anything that has dipped below the
    // water line.
    drawStars();
    drawMoon();

    // 4. Waves with crest-keyed random whitecaps. Each crest in each
    // wave layer rolls an independent "has whitecap?" check seeded by
    // (crestK, waveIdx), so whitecaps appear randomly across all three
    // layers. ~60% hit rate per crest. Sailboats are drawn immediately
    // after their assigned wave layer so a boat on the middle wave is
    // correctly occluded by the front wave.
    for (var i = 0; i < waves.length; i++) {
      var wave = waves[i];
      var yBase = h * wave.yFrac;
      for (var x = 0; x < w; x += PIXEL_SIZE) {
        var phase  = x * wave.frequency + t * wave.speed;
        var sinVal = Math.sin(phase);
        var yTop   = snap(yBase + sinVal * wave.amplitude);
        ctx.fillStyle = wave.color;
        for (var y = yTop; y < h; y += PIXEL_SIZE) {
          ctx.fillRect(x, y, PIXEL_SIZE, PIXEL_SIZE);
        }
        if (sinVal < -0.55) {
          // crestK identifies which crest cycle we're in; stays stable
          // as the wave moves, so a whitecap "rides" its crest instead
          // of flickering at fixed screen positions.
          var crestK = Math.round((phase + Math.PI / 2) / (2 * Math.PI));
          var seed   = Math.sin(crestK * 12.9898 + i * 78.233) * 43758.5453;
          var noise  = seed - Math.floor(seed);
          if (noise < 0.60) {
            ctx.fillStyle = '#f8fafc';
            ctx.fillRect(x, yTop, PIXEL_SIZE, PIXEL_SIZE);
            if (sinVal < -0.85) {
              ctx.fillRect(x, yTop + PIXEL_SIZE, PIXEL_SIZE, PIXEL_SIZE);
            }
          }
        }
      }
      // Boats riding this wave layer get drawn here, before the next
      // (more foreground) wave layer paints over them.
      drawSailboatsOnLayer(i);
    }

    // 5. Dolphins through air, 6. Splash particles in the foreground.
    drawDolphins();
    drawSplashes();
  }

  function animate() {
    stepSailboats();
    drawFrame();
    if (t % 90 === 0) spawnSplash();                                   // ~1.5s
    if (t > 120 && (t - 120) % 300 === 0) spawnDolphin();              // ~5s
    // Sailboats: stagger first spawn at 3s, second at ~9s so both
    // layers are populated relatively early, then top off every ~18s
    // as boats sail off-screen. Spawn logic caps at one per layer.
    if (t === 180 || t === 540 || (t > 540 && (t - 540) % (60 * 18) === 0)) {
      spawnSailboat();
    }
    t += 1;
    requestAnimationFrame(animate);
  }

  resize();
  window.addEventListener('resize', function () {
    resize();
    if (reduced) drawFrame();
  });

  if (reduced) {
    // Single static frame, plus seed two sailboats on different wave
    // layers so the composition still reads as "boats on the water."
    sailboats.push({ x: window.innerWidth * 0.40, vx: -0.4, waveIdx: 1 });
    sailboats.push({ x: window.innerWidth * 0.65, vx: -0.4, waveIdx: 2 });
    drawFrame();
  } else {
    animate();
  }
})();
</script>

</body>
</html>
